<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #00d9ff;
            --danger: #ff0055;
            --warning: #ffa500;
            --safe: #00ff88;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
            color: var(--text);
            width: 450px;
            max-height: 600px;
            padding: 0;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(51, 65, 85, 0.5));
            border-bottom: 1px solid rgba(0, 217, 255, 0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 217, 255, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .status-badge.safe {
            background: rgba(0, 255, 136, 0.1);
            color: var(--safe);
            border: 1px solid var(--safe);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .status-badge.warning {
            background: rgba(255, 165, 0, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
            box-shadow: 0 0 15px rgba(255, 165, 0, 0.2);
        }

        .status-badge.danger {
            background: rgba(255, 0, 85, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        /* Confidence */
        .confidence-section {
            margin-bottom: 20px;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .confidence-bar {
            width: 100%;
            height: 6px;
            background: rgba(51, 65, 85, 0.6);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 217, 255, 0.1);
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #0099ff);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            transition: width 0.6s ease-out;
        }

        /* Risk Breakdown */
        .risk-breakdown {
            background: rgba(15, 23, 42, 0.5);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .risk-title {
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .risk-items {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .risk-item {
            padding: 8px;
            background: rgba(51, 65, 85, 0.4);
            border-radius: 4px;
            border-left: 2px solid var(--accent);
        }

        .risk-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .risk-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Red Flags */
        .red-flags {
            margin-bottom: 15px;
        }

        .flags-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .flags-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .flag-item {
            padding: 8px 10px;
            background: rgba(255, 0, 85, 0.08);
            border-left: 2px solid var(--danger);
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .flag-item.warning {
            background: rgba(255, 165, 0, 0.08);
            border-left-color: var(--warning);
        }

        .flag-item.info {
            background: rgba(0, 217, 255, 0.08);
            border-left-color: var(--accent);
        }

        .flag-icon {
            font-size: 12px;
            flex-shrink: 0;
        }

        /* URL Display */
        .url-section {
            background: rgba(51, 65, 85, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 11px;
            word-break: break-all;
            color: var(--text-muted);
            border-left: 2px solid var(--accent);
        }

        .url-label {
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        /* Footer */
        footer {
            background: rgba(30, 41, 59, 0.8);
            border-top: 1px solid rgba(0, 217, 255, 0.1);
            padding: 12px 20px;
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--accent), #0099ff);
            color: var(--primary);
        }

        .btn-analyze:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.3);
        }

        .btn-history {
            background: rgba(51, 65, 85, 0.6);
            color: var(--text);
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .btn-history:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: rgba(0, 217, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Error State */
        .error-state {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            color: var(--danger);
        }

        .error-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .error-text {
            font-size: 13px;
            line-height: 1.4;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            gap: 10px;
        }

        .empty-icon {
            font-size: 40px;
        }

        .empty-text {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }

        /* Scrollbar */
        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(0, 217, 255, 0.2);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 217, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">🛡️ SCAM DETECTOR</div>
            <button class="close-btn" id="close-btn">✕</button>
        </header>

        <!-- Content -->
        <div class="content" id="content">
            <!-- Loading State (default) -->
            <div id="loading-state" class="loading-state">
                <div class="spinner"></div>
                <div class="loading-text">Ready to Analyze</div>
            </div>

            <!-- Results State (hidden by default) -->
            <div id="results-state" style="display: none;">
                <!-- Status Badge -->
                <div id="status-badge" class="status-badge"></div>

                <!-- URL -->
                <div id="url-section" class="url-section" style="display: none;">
                    <div class="url-label">Current URL</div>
                    <div id="url-display"></div>
                </div>

                <!-- Confidence -->
                <div class="confidence-section">
                    <div class="confidence-label">
                        <span>Confidence Score</span>
                        <span id="confidence-value">0%</span>
                    </div>
                    <div class="confidence-bar">
                        <div id="confidence-fill" class="confidence-fill" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Risk Breakdown -->
                <div class="risk-breakdown">
                    <div class="risk-title">📊 Risk Breakdown</div>
                    <div class="risk-items">
                        <div class="risk-item">
                            <div class="risk-label">Content</div>
                            <div class="risk-value" id="content-risk">-</div>
                        </div>
                        <div class="risk-item">
                            <div class="risk-label">URL Risk</div>
                            <div class="risk-value" id="url-risk">-</div>
                        </div>
                        <div class="risk-item">
                            <div class="risk-label">Auth Risk</div>
                            <div class="risk-value" id="auth-risk">-</div>
                        </div>
                    </div>
                </div>

                <!-- Red Flags -->
                <div class="red-flags">
                    <div class="flags-title">⚠️ Red Flags</div>
                    <div class="flags-list" id="flags-list"></div>
                </div>
            </div>

            <!-- Error State (hidden by default) -->
            <div id="error-state" style="display: none;">
                <div class="error-state">
                    <div class="error-icon">⚠️</div>
                    <div class="error-text" id="error-message"></div>
                </div>
            </div>

            <!-- Empty State (shown when no analysis yet) -->
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">🔒</div>
                <div class="empty-text">Click analyze to check this page</div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <button class="btn btn-analyze" id="analyze-btn">🔍 Analyze</button>
            <button class="btn btn-history" id="history-btn">📝 History</button>
        </footer>
    </div>

    <script src="js/popup.js"></script>
</body>
</html>
